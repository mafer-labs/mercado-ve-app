<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CuentaClara</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="login-screen" style="display:flex; flex-direction:column; align-items:center; justify-content:center; height:100vh; text-align:center;">
        <h1 style="color:#22c55e; font-size:32px;">CuentaClara</h1>
        <p id="status-msg" style="font-size:12px; color:#666; margin-bottom:20px;">Presiona el botón para entrar</p>
        <button id="login-btn" onclick="window.loginConGoogle()" style="padding:15px 30px; background:#fff; border:2px solid #22c55e; border-radius:12px; font-weight:bold; cursor:pointer;">
             🔑 Iniciar Sesión con Google
        </button>
    </div>

    <div id="main-app" style="display:none; padding:20px;">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <h2>Hola! 👋</h2>
            <button onclick="window.logout()" style="color:red; background:none; border:none; font-weight:bold;">Salir</button>
        </div>
        <p>Ya puedes usar tu calculadora.</p>
        </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, signInWithRedirect, getRedirectResult, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBqq-oNLwtX-VWvRm6zHZKcENX-LktTuaM",
            authDomain: "mercado-ve-db.firebaseapp.com",
            projectId: "mercado-ve-db",
            storageBucket: "mercado-ve-db.firebasestorage.app",
            messagingSenderId: "147270255959",
            appId: "1:147270255959:web:48f9c14451153b17e6ea12"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        // Función de inicio
        window.loginConGoogle = () => {
            document.getElementById('status-msg').innerText = "Conectando con Google...";
            signInWithRedirect(auth, provider);
        };

        window.logout = () => signOut(auth).then(() => location.reload());

        // Escuchar cuando el usuario vuelve de Google
        getRedirectResult(auth).then((result) => {
            if (result) {
                console.log("Logueado con éxito");
            }
        }).catch((error) => {
            alert("Error de Google: " + error.code);
        });

        // Vigilar si el usuario ya entró
        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('main-app').style.display = 'block';
            } else {
                document.getElementById('login-screen').style.display = 'flex';
                document.getElementById('main-app').style.display = 'none';
            }
        });
    </script>
</body>
</html>
